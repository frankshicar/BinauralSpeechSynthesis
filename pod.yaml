apiVersion: v1
kind: Pod
metadata:
  name: binauralspeechsynthesis-gpu-v2
spec:
  activeDeadlineSeconds: 86400
  restartPolicy: Never
  containers:
  - name: binauralspeechsynthesis
    image: nvcr.io/nvidia/pytorch:25.12-py3
    imagePullPolicy: IfNotPresent
    workingDir: /workspace/BinauralSpeechSynthesis
    command: ["/bin/bash", "-c", "sleep 1d"]
    resources:
      limits:
        nvidia.com/gpu: 1
    volumeMounts:
    - mountPath: /workspace/BinauralSpeechSynthesis
      name: workdir
  volumes:
  - name: workdir
    hostPath:
      path: /home/sbplab/frank/BinauralSpeechSynthesis
      type: Directory
